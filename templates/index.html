{% extends "base.html" %}
{% block title %}PaGon — Menu{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/menu.css') }}">

<div class="menu-page">
  <div class="screen">

    <!-- ===== nagłówek / status ===== -->
    <div class="status">
      <p><span class="k">DATA:</span> <span class="v" id="live-data">{{ data }}</span></p>
      <p><span class="k">GODZINA:</span> <span class="v" id="live-godzina">{{ godzina }}</span></p>
      <p><span class="k">UŻYTKOWNIK:</span> <span class="v" id="live-uzytkownik">{{ uzytkownik }}</span></p>
    </div>

    <!-- ===== diamond menu ===== -->
    <div class="diamond">

      <!-- CENTER: orb PaGon -->
      <div class="orb-wrap">
        <div class="orb-halo"></div>
        <div class="orb">
          <img src="{{ url_for('static', filename='img/logo-pagon-mark.png') }}" alt="PaGon">
        </div>
      </div>

      <!-- TOP: Twoje konto -->
      <a href="{{ url_for('konto') }}" class="di di-top" aria-label="Twoje konto">
        <span class="di-ico"><img src="{{ url_for('static', filename='img/ic-konto.png') }}" alt="Twoje konto"></span>
        <span class="di-label">Twoje konto</span>
      </a>

      <!-- LEFT: Taryfikator -->
      <a href="{{ url_for('taryfikator') }}" class="di di-left" aria-label="Taryfikator">
        <span class="di-ico"><img src="{{ url_for('static', filename='img/ic-taryfikator.png') }}" alt="Taryfikator"></span>
        <span class="di-label">Taryfikator</span>
      </a>

      <!-- RIGHT: Pomoce / Linki -->
      <a href="{{ url_for('pomoce') }}" class="di di-right" aria-label="Pomoce i linki">
        <span class="di-ico"><img src="{{ url_for('static', filename='img/ic-pomoce.png') }}" alt="Pomoce i linki"></span>
        <span class="di-label">Pomoce / Linki</span>
      </a>

      <!-- BOTTOM: Przepisy -->
      <a href="{{ url_for('przepisy') }}" class="di di-bottom" aria-label="Przepisy">
        <span class="di-ico"><img src="{{ url_for('static', filename='img/ic-przepisy.png') }}" alt="Przepisy"></span>
        <span class="di-label">Przepisy</span>
      </a>

    </div>
  </div>
</div>

<script>
  (function () {
    try {
      var raw = localStorage.getItem("pagon_konto");
      var el = document.getElementById("live-uzytkownik");
      if (!el) return;
      var s = raw ? JSON.parse(raw) : null;
      el.textContent = (s && s.accountCreated && s.nickname) ? s.nickname : "Gość";
    } catch (e) {}
  })();
</script>
{% endblock %}
